<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>why-benchkit</title>
		<link rel="stylesheet" href="::escapedCss::" />
	</head>
	<body>
		<header class="page-header">
			<h1>why-benchkit</h1>
			<p class="meta">Historical benchmark charts</p>
			<p id="file-protocol-note" class="note" hidden>
				Serve this page over HTTP (e.g. <code>npx serve</code> or
				<code>python -m http.server</code>). Opening via
				<code>file://</code> will fail because browsers block local
				<code>fetch</code>.
			</p>
		</header>

		<div id="status" class="status">Loading…</div>

		<section id="controls" class="controls" hidden>
			<div class="control-group">
				<span class="control-label">Haxe</span>
				<div
					id="sel-haxe"
					class="btn-group"
					role="group"
					aria-label="Haxe"
				></div>
			</div>
			<div class="control-group">
				<span class="control-label">Target</span>
				<div
					id="sel-target"
					class="btn-group"
					role="group"
					aria-label="Target"
				></div>
			</div>
			<div class="control-group">
				<span class="control-label">Suite</span>
				<div
					id="sel-suite"
					class="btn-group"
					role="group"
					aria-label="Suite"
				></div>
			</div>
			<label id="dirty-label" class="checkbox" hidden>
				<input type="checkbox" id="chk-dirty" />
				<span>Show dirty overlay</span>
			</label>
		</section>

		<p id="empty" class="empty" hidden></p>
		<div id="charts" class="charts"></div>

		<script>
			window.WHY_BENCHKIT = { jsonBase: "::escapedBase::" };
		</script>
		<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
		<script src="::escapedJs::"></script>
	</body>
</html>
